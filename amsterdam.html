<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Amsterdam 2025</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#F7F5F2; --surface:#FFFFFF; --border:#E8E3DC; --border-soft:#F0EBE3;
  --text:#1C1917; --muted:#78716C; --faint:#A8A29E;
  --blue:#2563EB; --blue-bg:#EFF6FF;
  --orange:#D97706; --orange-bg:#FFFBEB;
  --green:#16A34A; --green-bg:#F0FDF4;
  --purple:#7C3AED; --purple-bg:#F5F3FF;
  --brown:#B45309; --brown-bg:#FFF7ED;
  --HH:68px; --R:10px;
  --font:'Plus Jakarta Sans',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;-webkit-tap-highlight-color:transparent}
.hdr{position:sticky;top:0;z-index:100;background:#fff;border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;gap:10px}
.hdr-logo{font-size:22px}
.hdr-info{flex:1}
.hdr-title{font-size:15px;font-weight:800;letter-spacing:-.3px}
.hdr-sub{font-size:10px;color:var(--muted);margin-top:1px}
.btn-icon{background:none;border:1px solid var(--border);border-radius:8px;padding:5px 10px;font-size:12px;cursor:pointer;font-family:var(--font);color:var(--muted)}
.tabs{display:flex;overflow-x:auto;background:#fff;border-bottom:1px solid var(--border);position:sticky;top:49px;z-index:99;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:0 0 auto;padding:7px 13px 8px;cursor:pointer;border-bottom:2px solid transparent;text-align:center;min-width:66px;transition:all .15s}
.tab.on{border-bottom-color:var(--blue);color:var(--blue)}
.tab-e{font-size:16px;display:block;line-height:1.3}
.tab-d{font-size:10px;font-weight:700;display:block}
.tab-n{font-size:9px;color:var(--faint);display:block}
.legend{display:flex;flex-wrap:wrap;gap:5px 10px;padding:7px 14px;background:#fff;border-bottom:1px solid var(--border-soft)}
.lg{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--muted)}
.lgd{width:7px;height:7px;border-radius:2px}
.hint{margin-left:auto;font-size:9px;color:var(--faint)}
.day{display:none}
.day.on{display:block}
.day-hdr{background:#fff;padding:9px 16px;border-bottom:1px solid var(--border-soft);display:flex;align-items:center}
.day-hdr h2{font-size:13px;font-weight:700;flex:1}
.cost-pill{background:var(--green-bg);color:var(--green);border-radius:20px;padding:2px 9px;font-size:10px;font-weight:700}
.grid{position:relative;padding-left:42px;min-height:calc(var(--HH)*16)}
.hl{position:absolute;left:42px;right:0;height:var(--HH);border-top:1px solid var(--border-soft)}
.hl:nth-child(even){background:rgba(255,255,255,.6)}
.hlb{position:absolute;left:0;width:38px;height:var(--HH);display:flex;align-items:flex-start;justify-content:flex-end;padding:5px 6px 0;font-size:9px;font-weight:600;color:var(--faint)}
.drop-line{display:none;position:absolute;left:42px;right:0;height:2px;background:var(--blue);z-index:20;pointer-events:none}
.drop-line::before{content:'';position:absolute;left:-5px;top:-4px;width:10px;height:10px;border-radius:50%;background:var(--blue)}
.drop-label{position:absolute;left:-41px;top:-9px;width:38px;background:var(--blue);color:#fff;border-radius:4px;padding:1px 3px;font-size:9px;font-weight:700;text-align:center}
.empty-day{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--faint);pointer-events:none}
.empty-day .ei{font-size:30px}
.empty-day p{font-size:13px;font-weight:600}
.empty-day small{font-size:11px}
.blk{position:absolute;left:46px;right:6px;border-radius:var(--R);padding:5px 8px;cursor:pointer;border-left:3px solid;overflow:hidden;touch-action:none;user-select:none;-webkit-user-select:none;box-shadow:0 1px 3px rgba(0,0,0,.07);z-index:10}
.blk.dragging{opacity:.25}
.blk.pressing{box-shadow:0 4px 16px rgba(0,0,0,.13);transform:scale(1.015)}
.blk-name{font-size:11px;font-weight:700;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.blk-time{font-size:9px;color:var(--muted);margin-top:1px;font-weight:500}
.blk-badge{display:inline-flex;align-items:center;margin-top:2px;font-size:8px;font-weight:700;border-radius:4px;padding:1px 4px}
.badge-warn{background:rgba(217,119,6,.14);color:var(--orange)}
.badge-ok{background:rgba(22,163,74,.13);color:var(--green)}
.cat-activity{background:var(--blue-bg);border-color:var(--blue)}
.cat-transport{background:var(--orange-bg);border-color:var(--orange)}
.cat-meal{background:var(--green-bg);border-color:var(--green)}
.cat-rest{background:var(--purple-bg);border-color:var(--purple)}
.cat-optional{background:var(--brown-bg);border-color:var(--brown)}
#ghost{display:none;position:fixed;z-index:500;pointer-events:none;border-radius:var(--R);border-left:3px solid;padding:6px 10px;font-family:var(--font);font-size:11px;font-weight:700;max-width:200px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;box-shadow:0 6px 20px rgba(0,0,0,.16);transform:translate(-50%,-110%)}
.section{margin:12px;background:#fff;border-radius:12px;border:1px solid var(--border);overflow:hidden}
.sec-hdr{padding:12px 14px;display:flex;align-items:center;gap:8px;cursor:pointer;border-bottom:1px solid var(--border-soft)}
.sec-hdr h3{font-size:13px;font-weight:700;flex:1}
.sec-arr{font-size:11px;color:var(--faint);transition:transform .2s}
.sec-arr.shut{transform:rotate(-90deg)}
.sec-body{padding:12px 14px}
.sec-body.hide{display:none}
.comp-zone{min-height:52px;border:2px dashed var(--border);border-radius:8px;padding:8px;display:flex;flex-direction:column;gap:6px;transition:all .15s}
.comp-zone.over{border-color:var(--blue);background:var(--blue-bg)}
.comp-empty{text-align:center;padding:12px;font-size:11px;color:var(--faint)}
.comp-row{background:var(--bg);border-radius:7px;padding:6px 10px;display:flex;align-items:center;gap:8px}
.comp-name{font-size:11px;color:var(--faint);text-decoration:line-through;flex:1}
.comp-btn{font-size:10px;font-weight:700;color:var(--blue);padding:3px 8px;background:var(--blue-bg);border-radius:5px;cursor:pointer;border:none;font-family:var(--font)}
.notes-ta{width:100%;border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-family:var(--font);font-size:13px;line-height:1.55;resize:vertical;min-height:100px;background:var(--bg);color:var(--text);outline:none}
.notes-ta:focus{border-color:var(--blue);background:#fff}
.fab{position:fixed;bottom:22px;right:22px;width:52px;height:52px;border-radius:50%;background:var(--blue);color:#fff;border:none;font-size:26px;cursor:pointer;box-shadow:0 4px 16px rgba(37,99,235,.4);z-index:98;display:flex;align-items:center;justify-content:center}
.fab:active{transform:scale(.93)}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;align-items:flex-end;backdrop-filter:blur(2px)}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:18px 18px 0 0;width:100%;max-height:90vh;overflow-y:auto;animation:up .22s cubic-bezier(.32,.72,0,1)}
@keyframes up{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-hdr{position:sticky;top:0;background:#fff;padding:14px 16px 12px;border-bottom:1px solid var(--border-soft);display:flex;align-items:center;gap:10px;z-index:5}
.modal-hdr h3{font-size:15px;font-weight:800;flex:1;letter-spacing:-.3px}
.modal-x{width:28px;height:28px;border-radius:50%;background:var(--bg);border:none;cursor:pointer;font-size:17px;color:var(--muted);display:flex;align-items:center;justify-content:center}
.modal-body{padding:14px 16px 12px}
.field{margin-bottom:12px}
.field label{display:block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:4px}
.field input,.field select,.field textarea{width:100%;border:1px solid var(--border);border-radius:9px;padding:10px 12px;font-family:var(--font);font-size:14px;color:var(--text);background:#fff;outline:none;-webkit-appearance:none}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--blue)}
.field textarea{resize:vertical;min-height:70px;line-height:1.5}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.check-row{display:flex;align-items:center;gap:9px;margin-bottom:12px}
.check-row input{width:17px;height:17px;cursor:pointer;accent-color:var(--blue)}
.check-row label{font-size:13px;cursor:pointer}
.cat-badge{display:inline-block;border-radius:20px;padding:3px 11px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;margin-bottom:10px}
.res-row{display:flex;align-items:center;gap:10px;background:#FFFBEB;border:1px solid #FDE68A;border-radius:9px;padding:10px 12px;margin-bottom:11px}
.res-row.done{background:var(--green-bg);border-color:#BBF7D0}
.res-row input[type=checkbox]{width:17px;height:17px;cursor:pointer;accent-color:var(--blue)}
.res-row label{font-size:13px;font-weight:600;cursor:pointer;flex:1}
.drow{display:flex;align-items:flex-start;gap:9px;padding:8px 0;border-bottom:1px solid var(--border-soft)}
.drow:last-of-type{border-bottom:none}
.drow-icon{font-size:14px;flex-shrink:0;margin-top:1px}
.drow-text{font-size:13px;line-height:1.55;color:#3C3733;flex:1;word-break:break-word}
.drow-link{color:var(--blue);text-decoration:none;font-weight:600}
.btn{width:100%;padding:13px;border:none;border-radius:10px;font-family:var(--font);font-size:14px;font-weight:700;cursor:pointer;margin-top:8px}
.btn:active{opacity:.87}
.btn-blue{background:var(--blue);color:#fff}
.btn-green{background:var(--green-bg);color:var(--green);border:1px solid #BBF7D0}
.btn-red{background:#FEF2F2;color:#B91C1C;border:1px solid #FECACA}
.btn-grey{background:var(--bg);color:var(--muted);border:1px solid var(--border)}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-logo">&#127799;</div>
  <div class="hdr-info">
    <div class="hdr-title">Amsterdam &mdash; Option A</div>
    <div class="hdr-sub">18&ndash;25 Avr &middot; Famille 3 &middot; <span id="total-cost"></span></div>
  </div>
  <button class="btn-icon" id="btn-settings">&#9881;</button>
</div>
<div class="tabs" id="tabs"></div>
<div class="legend">
  <div class="lg"><div class="lgd" style="background:var(--blue)"></div>Activit&#233;</div>
  <div class="lg"><div class="lgd" style="background:var(--orange)"></div>Transport</div>
  <div class="lg"><div class="lgd" style="background:var(--green)"></div>Repas</div>
  <div class="lg"><div class="lgd" style="background:var(--purple)"></div>Repos</div>
  <div class="lg"><div class="lgd" style="background:var(--brown)"></div>Optionnel</div>
  <div class="hint">Appui long = d&#233;placer</div>
</div>
<div id="days-wrap"></div>
<div class="section">
  <div class="sec-hdr" id="comp-hdr">
    <h3>&#10003; Activit&#233;s termin&#233;es</h3>
    <span class="sec-arr" id="comp-arr">&#9660;</span>
  </div>
  <div class="sec-body" id="comp-body">
    <div class="comp-zone" id="comp-zone"></div>
  </div>
</div>
<div class="section" style="margin-bottom:80px">
  <div class="sec-hdr" id="notes-hdr">
    <h3>Notes &amp; Infos pratiques</h3>
    <span class="sec-arr" id="notes-arr">&#9660;</span>
  </div>
  <div class="sec-body" id="notes-body">
    <textarea class="notes-ta" id="notes-ta" rows="7" placeholder="Vos notes personnelles..."></textarea>
  </div>
</div>
<button class="fab" id="fab">+</button>
<div id="ghost"></div>

<!-- DETAIL MODAL -->

<div class="modal-bg" id="mod-detail">
  <div class="modal" id="mod-detail-inner">
    <div class="modal-hdr">
      <h3 id="det-title">Activit&#233;</h3>
      <button class="modal-x" id="det-close">&#215;</button>
    </div>
    <div class="modal-body" id="det-body"></div>
  </div>
</div>

<!-- ADD/EDIT MODAL -->

<div class="modal-bg" id="mod-edit">
  <div class="modal" id="mod-edit-inner">
    <div class="modal-hdr">
      <h3 id="edit-title">Nouvelle activit&#233;</h3>
      <button class="modal-x" id="edit-close">&#215;</button>
    </div>
    <div class="modal-body">
      <div class="field"><label>Titre</label><input id="f-name" type="text" placeholder="Nom de l'activit&#233;"></div>
      <div class="row2">
        <div class="field"><label>Jour</label><select id="f-day"></select></div>
        <div class="field"><label>Cat&#233;gorie</label>
          <select id="f-cat">
            <option value="activity">Activit&#233;</option>
            <option value="transport">Transport</option>
            <option value="meal">Repas</option>
            <option value="rest">Repos</option>
            <option value="optional">Optionnel</option>
          </select>
        </div>
      </div>
      <div class="row2">
        <div class="field"><label>Heure d&#233;but</label><input id="f-start" type="time" value="10:00"></div>
        <div class="field"><label>Dur&#233;e (min)</label><input id="f-dur" type="number" placeholder="60" min="15" step="15"></div>
      </div>
      <div class="field"><label>Notes</label><textarea id="f-notes" placeholder="Infos pratiques, prix..."></textarea></div>
      <div class="field"><label>Site web</label><input id="f-web" type="url" placeholder="https://..."></div>
      <div class="field"><label>Adresse</label><input id="f-addr" type="text" placeholder="Adresse ou lieu"></div>
      <div class="field"><label>Lien Google Maps</label><input id="f-map" type="url" placeholder="https://maps.google.com/..."></div>
      <div class="field"><label>Co&#251;t estim&#233; (&#8364;)</label><input id="f-cost" type="number" placeholder="0" min="0"></div>
      <div class="check-row"><input id="f-res" type="checkbox"><label for="f-res">N&#233;cessite une r&#233;servation</label></div>
      <button class="btn btn-blue" id="save-btn">Enregistrer</button>
      <button class="btn btn-grey" id="edit-cancel" style="margin-top:6px">Annuler</button>
    </div>
  </div>
</div>

<!-- SETTINGS MODAL -->

<div class="modal-bg" id="mod-settings">
  <div class="modal">
    <div class="modal-hdr">
      <h3>Param&#232;tres</h3>
      <button class="modal-x" id="settings-close">&#215;</button>
    </div>
    <div class="modal-body">
      <p style="font-size:13px;color:var(--muted);margin-bottom:14px;line-height:1.6">Les modifications sont sauvegard&#233;es automatiquement dans votre navigateur.</p>
      <button class="btn btn-red" id="reset-btn">R&#233;initialiser l'itin&#233;raire</button>
      <button class="btn btn-grey" id="settings-cancel" style="margin-top:8px">Fermer</button>
    </div>
  </div>
</div>

// ── STATE ──────────────────────────────────────────────────────────────
function loadState() {
  try {
    var raw = localStorage.getItem(KEY);
    if (raw) {
      var obj = JSON.parse(raw);
      if (obj && Array.isArray(obj.acts)) return obj;
    }
  } catch(ignored) {}
  return { acts: cloneActs(), notes: "" };
}
function cloneActs() { return JSON.parse(JSON.stringify(ACTS_DEFAULT)); }
function persist() {
  try { localStorage.setItem(KEY, JSON.stringify(ST)); } catch(ignored) {}
  refreshTotalCost();
}

var ST = loadState();
var activeDayId = 0;
var editingUid = null;

// ── HELPERS ────────────────────────────────────────────────────────────
function p2(n) { return (n < 10 ? "0" : "") + n; }
function fmt(h, m) { return p2(h) + "h" + p2(m); }
function calcEnd(act) { var tot = act.startHour * 60 + act.startMin + act.duration; return { h: Math.floor(tot / 60), m: tot % 60 }; }
function blockTop(act) { return ((act.startHour - SH) + act.startMin / 60) * HPX; }
function blockH(act)   { return Math.max((act.duration / 60) * HPX, 22); }
function newUid() { return "x" + Date.now().toString(36) + Math.random().toString(36).slice(2, 6); }
function G(id) { return document.getElementById(id); }
function esc(str) { return ("" + str).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function findAct(uid) { for (var i = 0; i < ST.acts.length; i++) { if (ST.acts[i].uid === uid) return ST.acts[i]; } return null; }

// ── BOOT ───────────────────────────────────────────────────────────────
function init() {
  buildTabs();
  buildDayColumns();
  refreshAll();
  G("notes-ta").value = ST.notes || "";
  G("notes-ta").addEventListener("input", function(ev) { ST.notes = ev.target.value; persist(); });
  G("fab").addEventListener("click", function() { openAddModal(null); });
  G("save-btn").addEventListener("click", commitActivity);
  G("det-close").addEventListener("click", function() { closeModal("mod-detail"); });
  G("edit-close").addEventListener("click", function() { closeModal("mod-edit"); });
  G("edit-cancel").addEventListener("click", function() { closeModal("mod-edit"); });
  G("settings-close").addEventListener("click", function() { closeModal("mod-settings"); });
  G("settings-cancel").addEventListener("click", function() { closeModal("mod-settings"); });
  G("reset-btn").addEventListener("click", doReset);
  G("btn-settings").addEventListener("click", function() { openModal("mod-settings"); });
  G("comp-hdr").addEventListener("click", function() { toggleSection("comp-body", "comp-arr"); });
  G("notes-hdr").addEventListener("click", function() { toggleSection("notes-body", "notes-arr"); });
  G("mod-detail").addEventListener("click", function(ev) { if (ev.target === this) closeModal("mod-detail"); });
  G("mod-edit").addEventListener("click", function(ev) { if (ev.target === this) closeModal("mod-edit"); });
  G("mod-settings").addEventListener("click", function(ev) { if (ev.target === this) closeModal("mod-settings"); });
  populateDaySelect();
  setDay(0);
  refreshTotalCost();
}

// ── TABS ───────────────────────────────────────────────────────────────
function buildTabs() {
  var html = "";
  for (var i = 0; i < DAY_DATA.length; i++) {
    var d = DAY_DATA[i];
    html += '<div class="tab" id="tab-' + d[0] + '" data-did="' + d[0] + '">' +
            '<span class="tab-e">' + dayEmoji(DAY_EM[i]) + '</span>' +
            '<span class="tab-d">' + d[1] + '</span>' +
            '<span class="tab-n">' + d[2].slice(0,3) + '</span>' +
            '</div>';
  }
  G("tabs").innerHTML = html;
  var tabs = G("tabs").querySelectorAll(".tab");
  for (var j = 0; j < tabs.length; j++) {
    (function(tab) {
      tab.addEventListener("click", function() { setDay(parseInt(tab.dataset.did)); });
    })(tabs[j]);
  }
}

// ── COLUMNS ────────────────────────────────────────────────────────────
function buildDayColumns() {
  var html = "";
  for (var i = 0; i < DAY_DATA.length; i++) {
    var d = DAY_DATA[i];
    html += '<div class="day" id="day-' + d[0] + '">' +
            '<div class="day-hdr"><h2>' + dayEmoji(DAY_EM[i]) + ' ' + d[2] + ' ' + d[1] + ' &mdash; ' + dayLabel(d[0]) + '</h2>' +
            '<span id="dcost-' + d[0] + '"></span></div>' +
            '<div class="grid" id="grid-' + d[0] + '">' +
            buildHours() +
            '<div class="drop-line" id="dline-' + d[0] + '"><span class="drop-label" id="dlbl-' + d[0] + '"></span></div>' +
            '</div></div>';
  }
  G("days-wrap").innerHTML = html;
}

function buildHours() {
  var html = "";
  for (var h = SH; h < EH; h++) {
    var top = (h - SH) * HPX;
    html += '<div class="hl" style="top:' + top + 'px"></div>';
    html += '<div class="hlb" style="top:' + top + 'px">' + p2(h) + 'h</div>';
  }
  return html;
}

// ── RENDER ─────────────────────────────────────────────────────────────
function refreshAll() {
  for (var i = 0; i < DAY_DATA.length; i++) refreshDay(DAY_DATA[i][0]);
  refreshCompleted();
}

function refreshDay(dayId) {
  var grid = G("grid-" + dayId);
  if (!grid) return;
  var old = grid.querySelectorAll(".blk, .empty-day");
  for (var k = 0; k < old.length; k++) old[k].parentNode.removeChild(old[k]);

  var acts = [];
  for (var i = 0; i < ST.acts.length; i++) {
    if (ST.acts[i].dayId === dayId && !ST.acts[i].isDone) acts.push(ST.acts[i]);
  }

  if (acts.length === 0) {
    var emp = document.createElement("div");
    emp.className = "empty-day";
    emp.innerHTML = (dayId === 6 ? '<span class="ei">&#11088;</span><p>Journ&#233;e libre!</p>' :
                                   '<span class="ei">&#128197;</span><p>Aucune activit&#233;</p>') +
                    '<small>Appuyez sur + pour ajouter</small>';
    grid.appendChild(emp);
  } else {
    for (var j = 0; j < acts.length; j++) grid.appendChild(makeBlock(acts[j]));
  }

  var total = 0;
  for (var m = 0; m < acts.length; m++) total += (acts[m].budget || 0);
  var cpEl = G("dcost-" + dayId);
  if (cpEl) cpEl.innerHTML = total > 0 ? '<span class="cost-pill">~' + total + '&#8364;</span>' : "";
}

function makeBlock(act) {
  var div = document.createElement("div");
  div.className = "blk cat-" + act.category;
  div.id = "blk-" + act.uid;
  div.setAttribute("data-uid", act.uid);
  div.style.top    = blockTop(act) + "px";
  div.style.height = blockH(act)   + "px";

  var en = calcEnd(act);
  var hp = blockH(act);
  var showTime = hp > 30;
  var badge = "";
  if (hp > 36 && act.needRes) {
    badge = act.isReserved
      ? '<div class="blk-badge badge-ok">R&#233;serv&#233;</div>'
      : '<div class="blk-badge badge-warn">&#8203;A r&#233;server</div>';
  }
  div.innerHTML = '<div class="blk-name">' + esc(act.title) + '</div>' +
    (showTime ? '<div class="blk-time">' + fmt(act.startHour, act.startMin) + ' &ndash; ' + fmt(en.h, en.m) + '</div>' : '') +
    badge;

  wireBlock(div, act.uid);
  return div;
}

// ── BLOCK INTERACTION ──────────────────────────────────────────────────
function wireBlock(div, uid) {
  var timer = null;
  var ox = 0, oy = 0;

  div.addEventListener("pointerdown", function onDown(ev) {
    if (ev.target.tagName === "INPUT") return;
    ev.preventDefault();
    ox = ev.clientX; oy = ev.clientY;
    div.classList.add("pressing");

    timer = setTimeout(function() {
      timer = null;
      div.classList.remove("pressing");
      beginDrag(ev, uid);
    }, 350);

    function onMove(ev2) {
      if (!timer) return;
      if (Math.abs(ev2.clientX - ox) > 10 || Math.abs(ev2.clientY - oy) > 10) {
        clearTimeout(timer); timer = null;
        div.classList.remove("pressing");
        document.removeEventListener("pointermove", onMove);
        beginDrag(ev2, uid);
      }
    }
    function onUp() {
      div.classList.remove("pressing");
      document.removeEventListener("pointermove", onMove);
      if (timer) { clearTimeout(timer); timer = null; showDetail(uid); }
    }
    document.addEventListener("pointermove", onMove, { passive: false });
    document.addEventListener("pointerup", onUp, { once: true });
  });
}

// ── DRAG ───────────────────────────────────────────────────────────────
var DRG = null;

function beginDrag(ev, uid) {
  var act = findAct(uid); if (!act) return;
  var blkEl = G("blk-" + uid); if (!blkEl) return;
  blkEl.classList.add("dragging");

  var ghost = G("ghost");
  ghost.style.display       = "block";
  ghost.style.background    = CAT_BG_MAP[act.category] || "#eee";
  ghost.style.borderColor   = CAT_COLOR_MAP[act.category] || "#999";
  ghost.style.left          = ev.clientX + "px";
  ghost.style.top           = ev.clientY + "px";
  ghost.textContent         = act.title;

  DRG = { uid: uid, blkEl: blkEl, dropH: null, dropM: null };
  document.addEventListener("pointermove", onDragMove, { passive: false });
  document.addEventListener("pointerup",   onDragUp,   { once: true });
}

function onDragMove(ev) {
  if (!DRG) return;
  ev.preventDefault();
  G("ghost").style.left = ev.clientX + "px";
  G("ghost").style.top  = ev.clientY + "px";

  var zone = G("comp-zone");
  var zr = zone.getBoundingClientRect();
  var inZone = ev.clientY >= zr.top && ev.clientY <= zr.bottom && ev.clientX >= zr.left && ev.clientX <= zr.right;
  zone.classList.toggle("over", inZone);
  if (inZone) { hideDropLine(); DRG.dropH = null; return; }

  var grid = G("grid-" + activeDayId);
  if (!grid) { hideDropLine(); return; }
  var gr = grid.getBoundingClientRect();
  var gy = ev.clientY - gr.top;
  if (gy >= 0 && gy <= gr.height) {
    var totalMin = (gy / HPX) * 60;
    var h = Math.floor(totalMin / 60) + SH;
    var m = Math.round((totalMin % 60) / SNAP) * SNAP;
    if (m >= 60) { h++; m = 0; }
    h = Math.max(SH, Math.min(EH - 1, h));
    showDropLine(activeDayId, h, m);
    DRG.dropH = h; DRG.dropM = m;
  } else { hideDropLine(); DRG.dropH = null; }
}

function onDragUp(ev) {
  if (!DRG) return;
  G("ghost").style.display = "none";
  DRG.blkEl.classList.remove("dragging");
  G("comp-zone").classList.remove("over");
  hideDropLine();

  var zone = G("comp-zone");
  var zr = zone.getBoundingClientRect();
  if (ev.clientY >= zr.top && ev.clientY <= zr.bottom) {
    setDone(DRG.uid);
  } else if (DRG.dropH !== null) {
    var act = findAct(DRG.uid);
    if (act) { act.startHour = DRG.dropH; act.startMin = DRG.dropM; persist(); refreshDay(act.dayId); }
  }
  document.removeEventListener("pointermove", onDragMove);
  DRG = null;
}

function showDropLine(dayId, h, m) {
  var ln = G("dline-" + dayId); var lb = G("dlbl-" + dayId);
  if (!ln) return;
  ln.style.top = ((h - SH) + m / 60) * HPX + "px";
  ln.style.display = "block";
  if (lb) lb.textContent = fmt(h, m);
}
function hideDropLine() {
  for (var i = 0; i < DAY_DATA.length; i++) {
    var ln = G("dline-" + DAY_DATA[i][0]);
    if (ln) ln.style.display = "none";
  }
}

// ── COMPLETED ──────────────────────────────────────────────────────────
function setDone(uid) {
  var act = findAct(uid); if (!act) return;
  act.isDone = true; persist(); refreshDay(act.dayId); refreshCompleted();
}
function restoreAct(uid) {
  var act = findAct(uid); if (!act) return;
  act.isDone = false; persist(); refreshDay(act.dayId); refreshCompleted();
}
function refreshCompleted() {
  var zone = G("comp-zone");
  var done = ST.acts.filter(function(a) { return a.isDone; });
  if (done.length === 0) {
    zone.innerHTML = '<div class="comp-empty">Glissez les activit&#233;s termin&#233;es ici &#8593;</div>';
    return;
  }
  var html = "";
  for (var i = 0; i < done.length; i++) {
    var em = dayEmoji(DAY_EM[done[i].dayId] || "star");
    html += '<div class="comp-row">' +
            '<span class="comp-name">' + em + ' ' + esc(done[i].title) + '</span>' +
            '<button class="comp-btn" data-ruid="' + done[i].uid + '">Restaurer</button>' +
            '</div>';
  }
  zone.innerHTML = html;
  var btns = zone.querySelectorAll(".comp-btn");
  for (var j = 0; j < btns.length; j++) {
    (function(btn) {
      btn.addEventListener("click", function() { restoreAct(btn.dataset.ruid); });
    })(btns[j]);
  }
}

// ── DETAIL ─────────────────────────────────────────────────────────────
function showDetail(uid) {
  var act = findAct(uid); if (!act) return;
  G("det-title").textContent = act.title;
  var en = calcEnd(act);
  var html = '<span class="cat-badge" style="background:' + CAT_BG_MAP[act.category] + ';color:' + CAT_COLOR_MAP[act.category] + '">' + CAT_NAME_MAP[act.category] + '</span>';

  if (act.needRes) {
    html += '<div class="res-row' + (act.isReserved ? ' done' : '') + '" id="rrow-' + uid + '">' +
            '<input type="checkbox" id="rcb-' + uid + '"' + (act.isReserved ? ' checked' : '') + '>' +
            '<label for="rcb-' + uid + '">' + (act.isReserved ? 'R&#233;serv&#233;!' : '&#8203;A r&#233;server &mdash; important!') + '</label>' +
            '</div>';
  }

  html += '<div class="drow"><span class="drow-icon">&#128336;</span>' +
          '<span class="drow-text"><strong>' + fmt(act.startHour, act.startMin) + ' &ndash; ' + fmt(en.h, en.m) + '</strong> &middot; ' + act.duration + ' min</span></div>';

  if (act.budget > 0) {
    html += '<div class="drow"><span class="drow-icon">&#128176;</span><span class="drow-text">~' + act.budget + '&#8364; estim&#233;</span></div>';
  }
  if (act.info) {
    html += '<div class="drow"><span class="drow-icon">&#128203;</span><span class="drow-text">' + esc(act.info).replace(/\n/g, "<br>") + '</span></div>';
  }
  if (act.website) {
    var domain = esc(act.website.replace(/https?:\/\//, "").split("/")[0]);
    html += '<div class="drow"><span class="drow-icon">&#127760;</span><a class="drow-text drow-link" href="' + esc(act.website) + '" target="_blank">' + domain + ' &#8599;</a></div>';
  }
  if (act.address) {
    html += '<div class="drow"><span class="drow-icon">&#128205;</span><span class="drow-text">' + esc(act.address);
    if (act.mapsUrl) html += '<br><a class="drow-link" href="' + esc(act.mapsUrl) + '" target="_blank">Voir sur Maps &#8599;</a>';
    html += '</span></div>';
  }

  html += '<button class="btn btn-blue" id="det-edit-btn" style="margin-top:14px">Modifier</button>' +
          '<button class="btn btn-green" id="det-done-btn">Marquer comme termin&#233;e</button>' +
          '<button class="btn btn-red"  id="det-del-btn">Supprimer</button>';

  G("det-body").innerHTML = html;

  if (act.needRes) {
    G("rcb-" + uid).addEventListener("change", function(ev) {
      act.isReserved = ev.target.checked;
      persist(); refreshDay(act.dayId);
      var row = G("rrow-" + uid);
      var lbl = row ? row.querySelector("label") : null;
      if (row) row.classList.toggle("done", act.isReserved);
      if (lbl) lbl.innerHTML = act.isReserved ? 'R&#233;serv&#233;!' : '&#8203;A r&#233;server &mdash; important!';
    });
  }
  G("det-edit-btn").addEventListener("click", function() { openEditModal(uid); });
  G("det-done-btn").addEventListener("click", function() { setDone(uid); closeModal("mod-detail"); });
  G("det-del-btn").addEventListener("click",  function() { deleteAct(uid); });

  openModal("mod-detail");
}

// ── ADD / EDIT MODAL ───────────────────────────────────────────────────
function populateDaySelect() {
  var html = "";
  for (var i = 0; i < DAY_DATA.length; i++) {
    var d = DAY_DATA[i];
    html += '<option value="' + d[0] + '">' + dayEmoji(DAY_EM[i]) + ' ' + d[2] + ' ' + d[1] + '</option>';
  }
  G("f-day").innerHTML = html;
}

function openAddModal(preDay) {
  editingUid = null;
  G("edit-title").textContent = "Nouvelle activit\u00e9";
  G("f-name").value   = "";
  G("f-notes").value  = "";
  G("f-web").value    = "";
  G("f-addr").value   = "";
  G("f-map").value    = "";
  G("f-cost").value   = "";
  G("f-dur").value    = "60";
  G("f-start").value  = "10:00";
  G("f-cat").value    = "activity";
  G("f-res").checked  = false;
  G("f-day").value    = (preDay !== null && preDay !== undefined) ? preDay : activeDayId;
  closeModal("mod-detail");
  openModal("mod-edit");
}

function openEditModal(uid) {
  var act = findAct(uid); if (!act) return;
  editingUid = uid;
  G("edit-title").textContent = "Modifier activit\u00e9";
  G("f-name").value   = act.title;
  G("f-day").value    = act.dayId;
  G("f-cat").value    = act.category;
  G("f-start").value  = p2(act.startHour) + ":" + p2(act.startMin);
  G("f-dur").value    = act.duration;
  G("f-notes").value  = act.info;
  G("f-web").value    = act.website;
  G("f-addr").value   = act.address;
  G("f-map").value    = act.mapsUrl;
  G("f-cost").value   = act.budget;
  G("f-res").checked  = act.needRes;
  closeModal("mod-detail");
  openModal("mod-edit");
}

function commitActivity() {
  var name = G("f-name").value.trim();
  if (!name) { G("f-name").focus(); return; }
  var parts = G("f-start").value.split(":");
  var sh = parseInt(parts[0]) || 0;
  var sm = parseInt(parts[1]) || 0;
  var dur = parseInt(G("f-dur").value) || 60;

  if (editingUid) {
    var act = findAct(editingUid);
    if (act) {
      var prevDay = act.dayId;
      act.title     = name;
      act.dayId     = parseInt(G("f-day").value);
      act.category  = G("f-cat").value;
      act.startHour = sh;
      act.startMin  = sm;
      act.duration  = dur;
      act.info      = G("f-notes").value;
      act.website   = G("f-web").value;
      act.address   = G("f-addr").value;
      act.mapsUrl   = G("f-map").value;
      act.budget    = parseFloat(G("f-cost").value) || 0;
      act.needRes   = G("f-res").checked;
      persist();
      refreshDay(prevDay);
      if (act.dayId !== prevDay) refreshDay(act.dayId);
    }
  } else {
    var newAct = {
      uid: newUid(), title: name, dayId: parseInt(G("f-day").value),
      category: G("f-cat").value, startHour: sh, startMin: sm, duration: dur,
      info: G("f-notes").value, website: G("f-web").value, address: G("f-addr").value,
      mapsUrl: G("f-map").value, budget: parseFloat(G("f-cost").value) || 0,
      needRes: G("f-res").checked, isReserved: false, isDone: false
    };
    ST.acts.push(newAct);
    persist();
    refreshDay(newAct.dayId);
  }
  closeModal("mod-edit");
}

function deleteAct(uid) {
  if (!confirm("Supprimer cette activit\u00e9 ?")) return;
  var act = findAct(uid); if (!act) return;
  var dayId = act.dayId;
  ST.acts = ST.acts.filter(function(a) { return a.uid !== uid; });
  persist(); refreshDay(dayId); closeModal("mod-detail");
}

// ── UTILS ──────────────────────────────────────────────────────────────
function setDay(id) {
  var tabs = G("tabs").querySelectorAll(".tab");
  for (var i = 0; i < tabs.length; i++) tabs[i].classList.remove("on");
  var days = document.querySelectorAll(".day");
  for (var j = 0; j < days.length; j++) days[j].classList.remove("on");
  var tab = G("tab-" + id); if (tab) { tab.classList.add("on"); tab.scrollIntoView({ behavior: "smooth", inline: "center", block: "nearest" }); }
  var day = G("day-" + id); if (day) day.classList.add("on");
  activeDayId = id;
}

function toggleSection(bodyId, arrId) {
  var body = G(bodyId); var arr = G(arrId);
  body.classList.toggle("hide");
  arr.classList.toggle("shut", body.classList.contains("hide"));
}

function openModal(id)  { G(id).classList.add("open"); }
function closeModal(id) { G(id).classList.remove("open"); }

function refreshTotalCost() {
  var total = 0;
  for (var i = 0; i < ST.acts.length; i++) {
    if (!ST.acts[i].isDone) total += ST.acts[i].budget || 0;
  }
  var el = G("total-cost");
  if (el) el.textContent = "~" + total + "\u20ac activit\u00e9s";
}

function doReset() {
  if (!confirm("R\u00e9initialiser tout l'itin\u00e9raire ?\nToutes vos modifications seront perdues.")) return;
  localStorage.removeItem(KEY);
  location.reload();
}

init();
})();
</script>

</body>
</html>
